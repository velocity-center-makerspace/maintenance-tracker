version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "db"
        emit_json_tags: true
        emit_result_struct_pointers: true
        overrides:
          - column: "*.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "asset.warranty_expiry"
            go_type: "database/sql.NullTime"
          - column: "asset.end_of_life"
            go_type: "database/sql.NullTime"
