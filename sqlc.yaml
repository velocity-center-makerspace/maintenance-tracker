version: "2"
sql:
  - engine: "sqlite"
    queries: ["db/queries/assets", "db/queries/tasks"]
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "db"
        emit_json_tags: true
        emit_result_struct_pointers: true
        query_parameter_limit: 2
        overrides:
          - column: "*.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "assets.warranty_expiry"
            go_type: "database/sql.NullTime"
          - column: "assets.end_of_life"
            go_type: "database/sql.NullTime"
          - column: "tasks.last_completed"
            go_type: "database/sql.NullTime"
          - column: "tasks.next_date"
            go_type: "database/sql.NullTime"
          - column: "tasks.start_date"
            go_type: "database/sql.NullTime"
          - column: "tasks.end_date"
            go_type: "database/sql.NullTime"
          - column: "completion_logs.completed_at"
            go_type: "database/sql.NullTime"
